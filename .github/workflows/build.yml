name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        env:
          ELECTRON_GET_USE_PROXY: true
          GLOBAL_AGENT_HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}

      - name: Build Windows
        run: |
          npx electron-builder install-app-deps
          npx electron-builder --win portable --x64 --publish=never
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-build
          path: dist/*.exe
          if-no-files-found: ignore

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        env:
          ELECTRON_GET_USE_PROXY: true
          GLOBAL_AGENT_HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}

      - name: Build macOS
        run: |
          npx electron-builder install-app-deps
          npx electron-builder --mac zip --x64 --publish=never
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-build
          path: dist/*
          if-no-files-found: ignore

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libasound2t64
          npm install
        env:
          ELECTRON_GET_USE_PROXY: true
          GLOBAL_AGENT_HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}

      - name: Build Linux
        run: |
          npx electron-builder install-app-deps
          npx electron-builder --linux AppImage --x64 --publish=never
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-build
          path: dist/*
          if-no-files-found: ignore

  # 手动下载 Artifact 即可，不需要自动发布 Release
  # 如需发布 Release，请手动上传 Artifact
