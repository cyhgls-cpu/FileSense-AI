<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 背景圆形 -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGradient)"/>

  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB7C5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A5FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="folderGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE4E9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 文件夹图标 -->
  <path d="M28 45 L28 90 Q28 95 33 95 L95 95 Q100 95 100 90 L100 45 Q100 40 95 40 L60 40 L55 33 L33 33 Q28 33 28 38 Z"
        fill="url(#folderGradient)" stroke="#FF8FA3" stroke-width="2"/>

  <!-- AI 神经网络图案 -->
  <g fill="none" stroke="#9B59B6" stroke-width="2" stroke-linecap="round">
    <!-- 节点 -->
    <circle cx="50" cy="60" r="4" fill="#E8D5F2"/>
    <circle cx="64" cy="52" r="4" fill="#E8D5F2"/>
    <circle cx="78" cy="60" r="4" fill="#E8D5F2"/>
    <circle cx="57" cy="75" r="4" fill="#E8D5F2"/>
    <circle cx="71" cy="75" r="4" fill="#E8D5F2"/>

    <!-- 连接线 -->
    <line x1="50" y1="60" x2="64" y2="52"/>
    <line x1="64" y1="52" x2="78" y2="60"/>
    <line x1="50" y1="60" x2="57" y2="75"/>
    <line x1="64" y1="52" x2="71" y2="75"/>
    <line x1="78" y1="60" x2="71" y2="75"/>
    <line x1="57" y1="75" x2="71" y2="75"/>
  </g>

  <!-- 小星星装饰 -->
  <g fill="#FFD700">
    <polygon points="85,35 86,38 89,38 87,40 88,43 85,41 82,43 83,40 81,38 84,38"/>
    <polygon points="40,85 41,87 43,87 41,89 42,91 40,90 38,91 39,89 37,87 39,87"/>
  </g>
</svg>